<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>气体压强微观模拟 | 1000分子 · 实时压强Pa | 高中物理3D</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(10, 15, 30, 0.82);
      backdrop-filter: blur(12px);
      color: #f0f0f0;
      padding: 16px 24px;
      border-radius: 16px;
      pointer-events: none;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
      border-left: 5px solid #ff9900;
      z-index: 10;
    }
    #info h2 {
      margin: 0 0 12px;
      font-size: 1.5rem;
      font-weight: 500;
      color: #ffaa00;
    }
    .data-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 6px;
    }
    .data-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 1rem;
    }
    .data-item .label {
      color: #ccc;
    }
    .data-item span {
      font-weight: 700;
      color: #ffcc80;
      font-size: 1.3rem;
      background: rgba(0,0,0,0.5);
      padding: 3px 14px;
      border-radius: 20px;
      min-width: 80px;
      text-align: center;
    }
    .control-panel {
      position: absolute;
      bottom: 25px;
      left: 25px;
      right: 25px;
      background: rgba(18, 20, 32, 0.9);
      backdrop-filter: blur(16px);
      padding: 18px 28px;
      border-radius: 24px;
      color: #ddd;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 22px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 20;
    }
    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 150px;
    }
    .slider-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #bbb;
      letter-spacing: 0.6px;
    }
    .slider-group input[type=range] {
      width: 150px;
      cursor: pointer;
      accent-color: #ff9900;
    }
    .value-display {
      font-size: 1rem;
      font-weight: 700;
      color: #ffaa00;
      background: rgba(0,0,0,0.5);
      padding: 2px 12px;
      border-radius: 16px;
    }
    .height-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .height-btn {
      background: #334455;
      border: none;
      color: #ddd;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 25px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      border: 1px solid #556677;
    }
    .height-btn.active {
      background: #ff9900;
      color: #1a1a2e;
      border-color: #ffbb44;
      box-shadow: 0 0 15px #ff9900aa;
      transform: scale(1.05);
    }
    .height-btn:hover {
      background: #ffaa22;
      color: #111;
      border-color: #ffcc66;
    }
    .note {
      color: #999;
      font-size: 0.8rem;
    }
    @media (max-width: 850px) {
      .control-panel {
        flex-direction: column;
        gap: 14px;
        padding: 15px;
      }
      .height-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="info">
    <h2>🧪 气体压强测定 · 1000分子模拟</h2>
    <div class="data-grid">
      <div class="data-item"><span class="label">💥 压强</span> <span id="pressureValue">0.0</span> Pa</div>
      <div class="data-item"><span class="label">📐 高度</span> <span id="heightValue">3.0</span></div>
      <div class="data-item"><span class="label">🌡️ 温度</span> <span id="tempDisplay2">450</span> K</div>
      <div class="data-item"><span class="label">🧬 分子数</span> <span id="countDisplay2">1000</span></div>
    </div>
    <div style="font-size:0.8rem; color:#aaa; margin-top:8px;">调节温度(300-600K)、分子数(100-2000)或高度，观察压强变化</div>
  </div>

  <div class="control-panel">
    <div class="slider-group">
      <label>🌡️ 温度 (K)</label>
      <input type="range" id="tempSlider" min="300" max="600" step="10" value="450">
      <span class="value-display" id="tempDisplay">450 K</span>
    </div>
    <div class="slider-group">
      <label>🧬 分子数量</label>
      <input type="range" id="countSlider" min="100" max="2000" step="100" value="1000">
      <span class="value-display" id="countDisplay">1000</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <label style="color:#bbb; font-weight:600; font-size:0.85rem;">📏 活塞高度档位</label>
      <div class="height-buttons">
        <button class="height-btn" data-height="1.0">1.0</button>
        <button class="height-btn" data-height="2.0">2.0</button>
        <button class="height-btn active" data-height="3.0">3.0</button>
        <button class="height-btn" data-height="4.0">4.0</button>
        <button class="height-btn" data-height="5.0">5.0</button>
      </div>
    </div>
    <span class="note">🖱️ 拖动旋转视角 | 滚轮缩放</span>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ---------- 场景 ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0d18);
    scene.fog = new THREE.Fog(0x0b0d18, 8, 28);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 50);
    camera.position.set(7, 6, 9);
    camera.lookAt(0, 2.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 2.5, 0);
    controls.maxPolarAngle = Math.PI / 1.6;
    controls.minDistance = 5;
    controls.maxDistance = 18;
    controls.update();

    // 光照
    scene.add(new THREE.AmbientLight(0x404066));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.95);
    dirLight.position.set(6, 12, 7);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 512;
    dirLight.shadow.mapSize.height = 512;
    dirLight.shadow.camera.near = 0.8;
    dirLight.shadow.camera.far = 35;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -5;
    scene.add(dirLight);
    scene.add(new THREE.PointLight(0x335577, 0.5, 12, 0.5));

    // ---------- 容器结构 ----------
    const containerGroup = new THREE.Group();
    scene.add(containerGroup);
    
    const containerWidth = 2.8;
    const containerDepth = 2.2;
    const containerHeight = 5.5;
    const wallThickness = 0.1;
    
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xccddff,
      metalness: 0.05,
      roughness: 0.1,
      transparent: true,
      opacity: 0.12,
      clearcoat: 0.95,
      side: THREE.DoubleSide
    });
    
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(containerWidth, wallThickness, containerDepth),
      new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.7, roughness: 0.4 })
    );
    base.position.y = -wallThickness/2;
    base.castShadow = true;
    base.receiveShadow = true;
    containerGroup.add(base);
    
    const addWall = (w, h, d, x, y, z) => {
      const glass = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), glassMat);
      glass.position.set(x, y, z);
      containerGroup.add(glass);
      const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d));
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xaaccff }));
      line.position.set(x, y, z);
      containerGroup.add(line);
    };
    
    addWall(wallThickness, containerHeight, containerDepth, -containerWidth/2, containerHeight/2, 0);
    addWall(wallThickness, containerHeight, containerDepth, containerWidth/2, containerHeight/2, 0);
    addWall(containerWidth, containerHeight, wallThickness, 0, containerHeight/2, -containerDepth/2);
    addWall(containerWidth, containerHeight, wallThickness, 0, containerHeight/2, containerDepth/2);
    
    // 活塞
    const pistonThickness = 0.25;
    const pistonGeo = new THREE.BoxGeometry(containerWidth - 0.15, pistonThickness, containerDepth - 0.15);
    const pistonMat = new THREE.MeshStandardMaterial({
      color: 0xddbb55,
      metalness: 0.8,
      roughness: 0.25,
      emissive: new THREE.Color(0x221100)
    });
    const piston = new THREE.Mesh(pistonGeo, pistonMat);
    piston.castShadow = true;
    piston.receiveShadow = true;
    piston.position.set(0, 3.0, 0);
    containerGroup.add(piston);
    
    const handle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 0.22, 0.65, 8),
      new THREE.MeshStandardMaterial({ color: 0xccaa44, metalness: 0.7, roughness: 0.3 })
    );
    handle.position.set(0, 0.5, 0);
    handle.castShadow = true;
    piston.add(handle);
    const knob = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), handle.material);
    knob.position.set(0, 0.88, 0);
    knob.castShadow = true;
    piston.add(knob);

    // 边界
    const bounds = {
      minX: -containerWidth/2 + 0.22,
      maxX: containerWidth/2 - 0.22,
      minY: 0.10,
      maxY: piston.position.y - pistonThickness/2,
      minZ: -containerDepth/2 + 0.22,
      maxZ: containerDepth/2 - 0.22,
    };

    // ---------- 分子系统 (1000个更小的分子) ----------
    const molecules = [];
    const velocities = [];
    const moleculeGroup = new THREE.Group();
    scene.add(moleculeGroup);
    
    const moleculeRadius = 0.06; // 更小的分子半径
    const MOLECULE_MASS = 0.01; // 分子质量
    
    // 更多颜色
    const colors = [
      0xff4444, 0x44ff44, 0x4444ff, 0xff44aa, 0xaa44ff,
      0xff8800, 0x00ccff, 0xff5599, 0x55ff99, 0xcc33ff,
      0xff6622, 0x33ff88, 0x3388ff, 0xff33bb, 0x88ff33,
      0xff9933, 0x33ffaa, 0x6633ff, 0xff3366, 0x66ff33
    ];
    
    // 物理参数
    let currentTempK = 450;
    let targetCount = 1000;
    let currentHeight = 3.0;
    
    // 压强计算滑动窗口
    const PRESSURE_WINDOW_SIZE = 20;
    let pressureWindow = [];
    let displayedPressure = 0;
    
    // 温度与速度映射
    const TEMP_REF = 300;
    const SPEED_BASE = 3.0;
    
    function getSpeedFromTemp(tempK) {
      return SPEED_BASE * Math.sqrt(tempK / TEMP_REF);
    }
    
    function createMolecule() {
      const color = colors[Math.floor(Math.random() * colors.length)];
      const geo = new THREE.SphereGeometry(moleculeRadius, 6, 6); // 低多边形提高性能
      const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.3,
        metalness: 0.1,
        emissive: new THREE.Color(color).multiplyScalar(0.5)
      });
      const sphere = new THREE.Mesh(geo, mat);
      sphere.castShadow = false; // 1000个分子不投射阴影提高性能
      sphere.receiveShadow = false;
      
      const pistonBottom = piston.position.y - pistonThickness/2;
      const rangeX = bounds.maxX - bounds.minX;
      const rangeZ = bounds.maxZ - bounds.minZ;
      const rangeY = pistonBottom - bounds.minY - moleculeRadius * 2;
      
      const posX = bounds.minX + moleculeRadius + Math.random() * (rangeX - moleculeRadius * 2);
      const posZ = bounds.minZ + moleculeRadius + Math.random() * (rangeZ - moleculeRadius * 2);
      const posY = bounds.minY + moleculeRadius + Math.random() * rangeY;
      
      sphere.position.set(posX, posY, posZ);
      
      const speedBase = getSpeedFromTemp(currentTempK);
      const angle = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const speed = speedBase * (0.7 + Math.random() * 0.6);
      
      const vx = speed * Math.sin(phi) * Math.cos(angle);
      const vy = speed * Math.sin(phi) * Math.sin(angle);
      const vz = speed * Math.cos(phi);
      
      moleculeGroup.add(sphere);
      molecules.push(sphere);
      velocities.push(new THREE.Vector3(vx, vy, vz));
    }
    
    function removeMolecule() {
      if (molecules.length === 0) return;
      const mesh = molecules.pop();
      velocities.pop();
      moleculeGroup.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();
    }
    
    function adjustMoleculeCount(newCount) {
      const startTime = performance.now();
      while (molecules.length < newCount) {
        createMolecule();
        // 每100个让出主线程
        if (molecules.length % 200 === 0 && performance.now() - startTime > 30) {
          setTimeout(() => adjustMoleculeCount(newCount), 10);
          return;
        }
      }
      while (molecules.length > newCount) {
        removeMolecule();
      }
    }
    
    function updateAllVelocities() {
      const speedBase = getSpeedFromTemp(currentTempK);
      for (let vel of velocities) {
        const currentSpeed = vel.length();
        if (currentSpeed < 0.01) {
          const angle = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          vel.set(
            Math.sin(phi) * Math.cos(angle),
            Math.sin(phi) * Math.sin(angle),
            Math.cos(phi)
          );
        }
        const newSpeed = speedBase * (0.7 + Math.random() * 0.6);
        vel.normalize().multiplyScalar(newSpeed);
      }
    }
    
    function repositionMoleculesForNewHeight(newPistonBottom) {
      const rangeY = newPistonBottom - bounds.minY - moleculeRadius * 2;
      for (let mesh of molecules) {
        const rangeX = bounds.maxX - bounds.minX;
        const rangeZ = bounds.maxZ - bounds.minZ;
        mesh.position.x = bounds.minX + moleculeRadius + Math.random() * (rangeX - moleculeRadius * 2);
        mesh.position.z = bounds.minZ + moleculeRadius + Math.random() * (rangeZ - moleculeRadius * 2);
        mesh.position.y = bounds.minY + moleculeRadius + Math.random() * rangeY;
      }
    }
    
    function setPistonHeight(height) {
      currentHeight = height;
      piston.position.y = height;
      const pistonBottom = height - pistonThickness/2;
      bounds.maxY = pistonBottom;
      repositionMoleculesForNewHeight(pistonBottom);
      pressureWindow = [];
      
      document.getElementById('heightValue').textContent = height.toFixed(1);
      
      document.querySelectorAll('.height-btn').forEach(btn => {
        const btnHeight = parseFloat(btn.dataset.height);
        if (Math.abs(btnHeight - height) < 0.01) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }
    
    // ---------- UI绑定 ----------
    document.getElementById('tempSlider').addEventListener('input', (e) => {
      currentTempK = parseInt(e.target.value);
      document.getElementById('tempDisplay').textContent = currentTempK + ' K';
      document.getElementById('tempDisplay2').textContent = currentTempK;
      updateAllVelocities();
    });
    
    document.getElementById('countSlider').addEventListener('input', (e) => {
      targetCount = parseInt(e.target.value);
      document.getElementById('countDisplay').textContent = targetCount;
      document.getElementById('countDisplay2').textContent = targetCount;
      adjustMoleculeCount(targetCount);
    });
    
    document.querySelectorAll('.height-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const h = parseFloat(btn.dataset.height);
        setPistonHeight(h);
      });
    });
    
    // 初始化
    adjustMoleculeCount(targetCount);
    setPistonHeight(3.0);
    
    // ---------- 物理更新 ----------
    const pistonArea = (containerWidth - 0.15) * (containerDepth - 0.15);
    
    function physicsUpdate(deltaTime) {
      if (molecules.length === 0) {
        pressureWindow.push(0);
        if (pressureWindow.length > PRESSURE_WINDOW_SIZE) pressureWindow.shift();
        return;
      }
      
      const pistonBottom = piston.position.y - pistonThickness/2;
      bounds.maxY = pistonBottom;
      
      let totalImpulse = 0;
      
      // 使用子步提高碰撞检测精度
      const subSteps = 2;
      const subDt = deltaTime / subSteps;
      
      for (let s = 0; s < subSteps; s++) {
        for (let i = 0; i < molecules.length; i++) {
          const mesh = molecules[i];
          const vel = velocities[i];
          const pos = mesh.position;
          
          pos.x += vel.x * subDt;
          pos.y += vel.y * subDt;
          pos.z += vel.z * subDt;
          
          // X轴碰撞
          if (pos.x < bounds.minX + moleculeRadius) {
            pos.x = bounds.minX + moleculeRadius;
            if (vel.x < 0) vel.x = -vel.x;
          } else if (pos.x > bounds.maxX - moleculeRadius) {
            pos.x = bounds.maxX - moleculeRadius;
            if (vel.x > 0) vel.x = -vel.x;
          }
          
          // Z轴碰撞
          if (pos.z < bounds.minZ + moleculeRadius) {
            pos.z = bounds.minZ + moleculeRadius;
            if (vel.z < 0) vel.z = -vel.z;
          } else if (pos.z > bounds.maxZ - moleculeRadius) {
            pos.z = bounds.maxZ - moleculeRadius;
            if (vel.z > 0) vel.z = -vel.z;
          }
          
          // 底部碰撞
          if (pos.y < bounds.minY + moleculeRadius) {
            pos.y = bounds.minY + moleculeRadius;
            if (vel.y < 0) vel.y = -vel.y;
          }
          
          // 活塞碰撞
          if (pos.y > pistonBottom - moleculeRadius) {
            pos.y = pistonBottom - moleculeRadius;
            if (vel.y > 0) {
              totalImpulse += 2 * MOLECULE_MASS * vel.y;
              vel.y = -vel.y;
            }
          }
        }
      }
      
      // 计算瞬时压强
      const instantPressure = totalImpulse / (pistonArea * deltaTime);
      
      pressureWindow.push(instantPressure);
      if (pressureWindow.length > PRESSURE_WINDOW_SIZE) {
        pressureWindow.shift();
      }
    }
    
    // 显示更新
    let displayCounter = 0;
    const DISPLAY_RATE = 3; // 每3帧更新
    
    function updateDisplay() {
      if (pressureWindow.length > 0) {
        const sum = pressureWindow.reduce((a, b) => a + b, 0);
        displayedPressure = sum / pressureWindow.length;
      }
      
      document.getElementById('pressureValue').textContent = displayedPressure.toFixed(1);
      document.getElementById('heightValue').textContent = currentHeight.toFixed(1);
      document.getElementById('tempDisplay2').textContent = currentTempK;
      document.getElementById('countDisplay2').textContent = molecules.length;
    }
    
    // 动画循环
    const clock = new THREE.Clock();
    function animate() {
      const delta = Math.min(clock.getDelta(), 0.033);
      physicsUpdate(delta);
      
      displayCounter++;
      if (displayCounter >= DISPLAY_RATE) {
        updateDisplay();
        displayCounter = 0;
      }
      
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    function addLabel(text, pos, color='#ffffff') {
      const div = document.createElement('div');
      div.textContent = text;
      div.style.color = color;
      div.style.fontWeight = 'bold';
      div.style.fontSize = '13px';
      const label = new CSS2DObject(div);
      label.position.copy(pos);
      scene.add(label);
    }
    addLabel('活塞 (固定)', new THREE.Vector3(0, 5.3, 0.8), '#ffaa00');
    addLabel('透明容器', new THREE.Vector3(1.65, 2.5, 0), '#aaddff');
    
    console.log('✅ 1000分子压强模拟已启动 | 温度↑→压强↑ | 分子数↑→压强↑ | 高度↑→压强↓');
  </script>
</body>
</html>
