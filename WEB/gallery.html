<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体画廊 · 我的导航站</title>
    <style>
        :root {
            --bg-start: #0a0a1a;
            --bg-mid: #111133;
            --bg-end: #0d0d28;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.10);
            --card-hover-bg: rgba(255, 255, 255, 0.09);
            --card-hover-border: rgba(255, 255, 255, 0.22);
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0c8;
            --accent: #8a9eff;
            --radius: 18px;
            --transition-speed: 0.35s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #07071a 0%, #0d0d2b 30%, #0a0f24 60%, #08081f 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* 星空粒子 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            25% {
                opacity: 0.9;
                transform: scale(1.5);
            }
            50% {
                opacity: 0.35;
                transform: scale(0.9);
            }
            75% {
                opacity: 0.75;
                transform: scale(1.3);
            }
        }

        /* 流动光晕 */
        .aura {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .aura-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(90, 120, 255, 0.25) 0%, transparent 70%);
            top: -15%;
            left: -10%;
            animation: floatAura 14s ease-in-out infinite;
        }
        .aura-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(160, 90, 240, 0.22) 0%, transparent 70%);
            bottom: -12%;
            right: -8%;
            animation: floatAura2 16s ease-in-out infinite;
        }
        .aura-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(80, 190, 210, 0.18) 0%, transparent 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: floatAura 13s ease-in-out infinite;
        }
        @keyframes floatAura {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            20% {
                transform: translate(40px, -30px) scale(1.08);
            }
            40% {
                transform: translate(-25px, 35px) scale(0.94);
            }
            60% {
                transform: translate(-40px, -15px) scale(1.05);
            }
            80% {
                transform: translate(20px, 25px) scale(0.96);
            }
        }
        @keyframes floatAura2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(-35px, -25px) scale(1.06);
            }
            50% {
                transform: translate(30px, 30px) scale(0.93);
            }
            75% {
                transform: translate(-20px, -35px) scale(1.07);
            }
        }

        /* 主容器 */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            padding: 40px 30px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .back-link {
            align-self: flex-start;
            text-decoration: none;
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-link:hover {
            opacity: 1;
        }

        .header {
            text-align: center;
        }
        .header .page-title {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d0d8ff 0%, #cbb8ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 0 16px rgba(140, 160, 255, 0.35));
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            opacity: 0.7;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* 画廊网格 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
        }

        /* 媒体卡片 */
        .media-card {
            position: relative;
            border-radius: var(--radius);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            transition: all var(--transition-speed);
            display: flex;
            flex-direction: column;
        }
        .media-card:hover {
            border-color: var(--card-hover-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--card-hover-border) inset;
            transform: translateY(-3px);
        }

        .media-preview {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid var(--card-border);
        }
        .media-preview img,
        .media-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .media-info {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .media-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .media-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }
        .media-type {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* 下载按钮 —— 使用原生 <a> 标签，与下载中心一致 */
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--accent);
            padding: 7px 16px;
            border-radius: 25px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.25s;
            white-space: nowrap;
            cursor: pointer;
            font-family: inherit;
        }
        .download-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            box-shadow: 0 0 15px rgba(140, 160, 255, 0.25);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 14px;
            }
            .header .page-title {
                font-size: 1.8rem;
            }
            .media-info {
                padding: 12px;
                flex-direction: column;
                align-items: flex-start;
            }
            .download-btn {
                align-self: flex-end;
            }
        }
        @media (max-width: 400px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>
    <div class="aura aura-3"></div>

    <div class="main-wrapper">
        <a href="./index.html" class="back-link">← 返回主页</a>

        <div class="header">
            <h1 class="page-title">🖼️ 媒体画廊</h1>
            <p class="subtitle">浏览照片与视频 · 点击按钮下载</p>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>

        <p style="color: var(--text-secondary); opacity: 0.4; font-size: 0.75rem; letter-spacing: 1px; margin-top: 8px;">
            点击右侧下载按钮即可保存文件
        </p>
    </div>

    <script>
        (function() {
            // 生成星空粒子
            const starsContainer = document.getElementById('starsContainer');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.6 + 0.8;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2.5) + 's');
                star.style.setProperty('--delay', (Math.random() * 6) + 's');
                star.style.opacity = Math.random() * 0.4 + 0.15;
                fragment.appendChild(star);
            }
            starsContainer.appendChild(fragment);

            // ========== 🖼️ 媒体素材配置 ==========
            const mediaItems = [
                { id: 'p1', type: 'image', name: '晨曦山景', desc: 'JPG 图片', url: './images/photo1.jpg' },
                { id: 'p2', type: 'image', name: '城市夜景', desc: 'PNG 图片', url: './images/photo2.png' },
                { id: 'v1', type: 'video', name: '旅行短片', desc: 'MP4 视频', url: './video/demo.mp4' },
                { id: 'p3', type: 'image', name: '花海特写', desc: 'JPG 图片', url: './images/flower.jpg' },
                { id: 'v2', type: 'video', name: '产品演示', desc: 'MOV 视频', url: './video/promo.mov' },
            ];

            const galleryGrid = document.getElementById('galleryGrid');

            mediaItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'media-card';

                // 预览区域
                const previewDiv = document.createElement('div');
                previewDiv.className = 'media-preview';
                if (item.type === 'image') {
                    const img = document.createElement('img');
                    img.src = item.url;
                    img.alt = item.name;
                    img.loading = 'lazy';
                    previewDiv.appendChild(img);
                } else {
                    const video = document.createElement('video');
                    video.src = item.url;
                    video.controls = true;
                    video.preload = 'metadata';
                    video.playsInline = true;
                    previewDiv.appendChild(video);
                }

                // 底部信息行
                const infoDiv = document.createElement('div');
                infoDiv.className = 'media-info';
                infoDiv.innerHTML = `
                    <div class="media-text">
                        <span class="media-name">${item.name}</span>
                        <span class="media-type">${item.desc}</span>
                    </div>
                `;

                // ★ 下载按钮：与下载中心完全一样的 <a download> 方式
                const downloadBtn = document.createElement('a');
                downloadBtn.className = 'download-btn';
                downloadBtn.href = item.url;
                downloadBtn.setAttribute('download', item.name);
                downloadBtn.textContent = '⬇ 下载';
                infoDiv.appendChild(downloadBtn);

                card.appendChild(previewDiv);
                card.appendChild(infoDiv);
                galleryGrid.appendChild(card);
            });

            console.log('✅ 媒体画廊已就绪（使用 <a download> 方式，与下载中心一致）');
        })();
    </script>
</body>
</html>
